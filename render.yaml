services:
  # Unified Web Service (Backend + Frontend)
  - type: web
    name: devcollab-app
    env: node
    buildCommand: npm run build --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://devcollab-app.onrender.com # Update this after first deployment
      - key: VITE_API_URL
        value: https://devcollab-app.onrender.com/api
      - key: GOOGLE_CALLBACK_URL
        value: https://devcollab-app.onrender.com/api/auth/google/callback
      - key: GITHUB_CALLBACK_URL
        value: https://devcollab-app.onrender.com/api/auth/github/callback
      # Secrets should be set in the Render Dashboard
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_SECRET_KEY
        sync: false

